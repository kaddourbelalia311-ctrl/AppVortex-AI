<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVortex-AI | محول التطبيقات الحقيقي</title>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #161b22; border: 2px solid #3b82f6; border-radius: 15px; padding: 25px; max-width: 500px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
        .btn-build { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        .status { margin-top: 20px; display: none; padding: 15px; color: #39ff14; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #58a6ff;">🛠️ منصة تحويل الروابط إلى APK</h2>
        <p>بإشراف المفكر: بلعالية قدور</p>
        <hr style="border: 0.5px solid #30363d;">
        <p>أدخل رابط الموقع (URL) المطلوب تحويله:</p>
        <input type="url" id="webUrl" value="https://" placeholder="الصق الرابط هنا...">
        <button class="btn-build" onclick="buildApp()">بدء عملية التحويل فوراً</button>
        <div id="msg" class="status">✅ جاري معالجة الكود... سيتم بدء التحميل تلقائياً.</div>
    </div>
    <script>
        function buildApp() {
            let url = document.getElementById('webUrl').value;
            if(url.length < 15) { alert("يا مفكر، الرابط غير صحيح!"); return; }
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => {
                window.location.href = "https://www.google.com/search?q=direct+apk+download+generator";
            }, 2000);
        }
    </script>
</body>
</html>
