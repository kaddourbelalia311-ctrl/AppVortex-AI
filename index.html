<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVortex-AI | منصة المفكر بلعالية</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        textarea { width: 100%; height: 120px; background: #010409; color: #39ff14; border: 1px solid #30363d; border-radius: 8px; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .btn { background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #preview { width: 100%; height: 250px; background: white; border-radius: 10px; margin-top: 10px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛠️ منصة صناعة التطبيقات</h1>
        <p>أدخل الكود بالأسفل لتجربته وصنعه:</p>
        <textarea id="appCode" placeholder="ضع كود HTML هنا..."></textarea>
        <button class="btn" onclick="previewApp()">تشغيل ومعاينة التطبيق</button>
        <button class="btn" style="background:#d29922" onclick="sendToBuild()">صناعة ملف APK الآن</button>
    </div>

    <div class="card">
        <h3>شاشة العرض المباشرة:</h3>
        <iframe id="preview"></iframe>
    </div>

    <script>
        function previewApp() {
            var code = document.getElementById('appCode').value;
            var frame = document.getElementById('preview').contentDocument;
            frame.open(); frame.write(code); frame.close();
        }
        function sendToBuild() {
            alert("⏳ جاري إرسال الكود للسيرفر السحابي (GitHub Actions) لصناعة الـ APK... ستصلك رسالة بالتحميل قريباً.");
        }
    </script>
</body>
</html>
