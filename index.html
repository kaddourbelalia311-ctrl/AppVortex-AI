<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVortex-AI | المصنع الحقيقي</title>
    <style>
        body { background: #0b0f19; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #161b22; border: 2px solid #3b82f6; border-radius: 15px; padding: 25px; max-width: 450px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-build { background: linear-gradient(90deg, #ffd700, #ffa500); color: black; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
    </style>
</head>
<body>
    <div class="card">
        <h1>🇺🇸 AppVortex-AI</h1>
        <p>بإشراف المفكر: بلعالية قدور</p>
        <hr style="border:0.1px solid #30363d">
        <p>أدخل رابط موقعك أو كود الـ HTML لتحويله إلى APK:</p>
        <input type="text" id="target" placeholder="https://example.com" value="https://">
        <button class="btn-build" onclick="makeApk()">صناعة وتحميل APK فوراً</button>
        <p style="font-size: 12px; color: #8b949e; margin-top: 20px;">الخدمة مدعومة بمحرك Build سحابي خارجي</p>
    </div>

    <script>
        function makeApk() {
            let val = document.getElementById('target').value;
            if(val.length < 10) { alert("يا مفكر، الرابط قصير جداً!"); return; }
            alert("سيتم نقلك الآن إلى المصنع السحابي لتوليد ملف APK الخاص بك...");
            // هذا الرابط ينقلك لمصنع حقيقي يطلب منك الاسم والأيقونة ثم يعطيك APK
            window.location.href = "https://www.webintoapp.com/panel/wizard/direct";
        }
    </script>
</body>
</html>
