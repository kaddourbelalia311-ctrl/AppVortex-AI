<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppVortex-AI | المنصة الاحترافية</title>
    <style>
        body { background: #0b0f19; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #39ff14; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; box-sizing: border-box; }
        .btn-gold { background: linear-gradient(90deg, #ffd700, #ffa500); color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: #238636; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .payment-info { background: #1c2128; border: 1px dashed #f1e05a; padding: 10px; border-radius: 8px; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🤖 مساعد الذكاء الاصطناعي (AI)</h2>
        <p>اسأل Gemini عن أي تعديل في كودك قبل التحويل:</p>
        <textarea placeholder="اكتب سؤالك للذكاء الاصطناعي هنا..."></textarea>
        <button class="btn-blue">تحليل الكود بواسطة AI</button>
    </div>

    <div class="card">
        <h2>🛠️ محول الأكواد إلى APK</h2>
        <textarea id="appCode" placeholder="أدخل كود HTML/JS الخاص بتطبيقك هنا..."></textarea>
        <button class="btn-gold" onclick="alert('جاري معالجة الكود وتحويله لملف APK... سيصلك الرابط فوراً')">تحميل تطبيق APK مباشرة</button>
    </div>

    <div class="card">
        <h2>💰 مركز الدفع واستلام الأرباح</h2>
        <div class="payment-info">
            <p>لدعم المنصة واستلام تطبيقك بدون إعلانات:</p>
            <p><b>USDT (TRC20):</b> <br> <span style="color:#f1e05a;">ضع_رابط_محفظتك_هنا</span></p>
            <button class="btn-blue" onclick="location.href='https://www.binance.com'">دفع عبر Binance</button>
        </div>
    </div>

    <p style="text-align:center; font-size: 12px; color: #8b949e;">إدارة المفكر: بلعالية قدور &copy; 2026</p>

</body>
</html>
